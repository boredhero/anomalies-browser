services:
  db:
    image: postgis/postgis:16-3.4
    container_name: hole-finder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hole_finder
      POSTGRES_USER: hole_finder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "192.168.1.111:5432:5432"
    volumes:
      - hole_finder_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - postgres
      - -c
      - shared_buffers=4GB
      - -c
      - work_mem=256MB
      - -c
      - effective_cache_size=48GB
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hole_finder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hole-finder-redis
    restart: unless-stopped
    ports:
      - "192.168.1.111:6379:6379"
    volumes:
      - hole_finder_redis:/data
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru

  flower:
    image: mher/flower:2.0
    container_name: hole-finder-flower
    restart: unless-stopped
    ports:
      - "192.168.1.111:5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
    profiles:
      - monitoring

volumes:
  hole_finder_pgdata:
  hole_finder_redis:
