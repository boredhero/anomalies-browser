services:
  db:
    image: postgis/postgis:16-3.4
    container_name: magic-eyes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: magic_eyes
      POSTGRES_USER: magic_eyes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "192.168.1.111:5432:5432"
    volumes:
      - magic_eyes_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - postgres
      - -c
      - shared_buffers=4GB
      - -c
      - work_mem=256MB
      - -c
      - effective_cache_size=48GB
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magic_eyes"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: magic-eyes-redis
    restart: unless-stopped
    ports:
      - "192.168.1.111:6379:6379"
    volumes:
      - magic_eyes_redis:/data
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru

  flower:
    image: mher/flower:2.0
    container_name: magic-eyes-flower
    restart: unless-stopped
    ports:
      - "192.168.1.111:5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
    profiles:
      - monitoring

volumes:
  magic_eyes_pgdata:
  magic_eyes_redis:
